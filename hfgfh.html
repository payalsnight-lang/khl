<html>
    <head>
        <title></title>
    </head>
    <body>
        <h1>Add your to do list here</h1>
        <form id="myform">
        <input id="myinput" type="text">
        <button>Add</button>
        </form>
        <h3>Shopping List</h3>
        <ul id="myitem"></ul>
        <script>
            var myform = document.getElementById("myform");
             var myitem = document.getElementById("myinput");
              var myitem = document.getElementById("myitem");
              myform.addEventListener("submit",function(event){
                event.preventDefault();
                createItem(myinput.value)

              })
              function createItem(inputitems){
                var items=`<li>${inputitems}<button onclick="deleteElement(this)">delete</button></li>`
                myitem.insertAdjacentHTML("beforeend",items)
                myinput.value=""
                myinput.focus()
                    
                }
                function deleteElement(ED){
                    ED.parentElement.remove( )
                }
        </script>
    </body>
</html>
